<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Juliette Mangon</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      width: 100%;
    }

    body {
      background: var(--gray);
      color: var(--red);
      line-height: 1.6;
      font-size: 1.05rem;
      overflow-x: hidden;
      position: relative;
    }

    main {
      min-height: 100vh;
      width: 100%;
      position: relative;
      animation: slideIn 0.6s ease forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    a {
      color: var(--red);
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover {
      color: var(--highlight);
    }

    .contact-section {
      min-height: 100vh;
      position: relative;
    }

    .contact-columns {
      position: absolute;
      left: 2rem;
      bottom: 2rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.25rem;
      max-width: min(90vw, 700px);
      padding-right: 1rem;
    }

    .contact-columns p {
      margin: 0;
      font-size: clamp(1.4rem, 3.5vw, 3.2rem);
      line-height: 1.1;
      text-align: left;
      word-break: break-word;
    }

    /* Keep orb where it is */
    .hero-orb {
      position: absolute;
      top: 53%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      pointer-events: none;
      z-index: 0;
      animation: orbBreathe 16s ease-in-out infinite;
    }

    .hero-orb img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 900px) {
      .hero-orb {
        top: 33%;

        width: 130vw;
        opacity: 0;
      }

      .contact-section {
        height: 100vh;
        min-height: 100vh;
        position: relative;
      }

      .topnav {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        right: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.25rem;
        z-index: 1500;
      }

      .topnav a {
        display: inline-block;
        padding: 0.125rem 0;
        line-height: 1.2;
      }

      .contact-columns {
        left: 2rem;
        bottom: 18rem;
        max-width: calc(100vw - 2rem);
      }

      .contact-columns p {
        font-size: clamp(1.15rem, 6vw, 2.2rem);
      }
    }

    @media (max-width: 1200px) and (min-width: 901px) {
      .topnav {
        gap: 0.75rem;
      }

      .contact-columns {
        left: 1.5rem;
        bottom: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <nav class="topnav" aria-label="Site">
    <a href="index.html">home</a>
    <a href="about.html">about</a>
    <a href="resume.html">resume</a>
    <a href="paintings.html">paintings</a>
    <a href="media.html">media</a>
    <a href="websites.html">websites</a>
    <a href="contact.html" class="active">contact</a>
  </nav>

  <main>
    <section class="contact-section">
      <div class="hero-orb">
        <img src="depth/orbs/darkblue.svg" alt="" aria-hidden="true">
      </div>

      <div class="contact-columns">
        <p>
          <a href="mailto:juliette.mangon@gmail.com">juliette.mangon@gmail.com</a>
        </p>
        <p>
          <a href="https://www.linkedin.com/in/juliette-mangon" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </p>
        <p>
          <a href="https://github.com/juliettemangon2" target="_blank" rel="noopener noreferrer">GitHub</a>
        </p>
        <p>
          <a href="https://sheisthemusic.org/profile/juliette-mangongmail-com/" target="_blank"
            rel="noopener noreferrer">She Is The Music</a>
        </p>
      </div>
    </section>
  </main>
</body>

</html>
