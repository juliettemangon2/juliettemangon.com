<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juliette Mangon</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
  <link rel="preload" href="./images/cards.jpeg" as="image">
  <link rel="preload" href="./images/mira.jpeg" as="image">
  <link rel="preload" href="./images/picnic.jpeg" as="image">
  <link rel="preload" href="./images/cliffs.jpeg" as="image">


  <style>
    :root {
      --red: #e93030;
      --gray: #e1e9eb;
      --highlight: #000000;
      --frame-gap: 0.75rem;
      --frame-w: 2px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      text-transform: uppercase;
      background: var(--gray);
      color: var(--red);
      font-family: "Inter", sans-serif;
      line-height: 1.6;
      font-size: 1.05rem;
      overflow: hidden;
    }


    main {
      height: 100svh;
      width: 100%;
      margin: 0;
      padding: 0;
      opacity: 1;
      position: relative;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .name-section {
      position: fixed;
      bottom: 0%;
      left: 50%;
      transform: translate(-50%, calc(-50% + 30px));
      display: flex;
      flex-direction: column;
      align-items: left;
      justify-content: left;
      z-index: 1000;
      animation: slideUp 0.6s ease forwards;
      opacity: 0;
      text-align: left;
      width: 100vw;
    }



    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    h1,
    h2 {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: left;
      line-height: 0.9;
      font-weight: 500;
      letter-spacing: -0.05em;
      font-size: 5rem;
      text-align: left;
      margin-bottom:1rem;
      margin-left: 2rem;

    }



    a {
      color: var(--red);
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover {
      color: var(--highlight);
    }

    /* Big centered orb */
    .hero-orb {
      position: absolute;
      top: 53%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 75vw;
      pointer-events: none;
      z-index: 0;
      animation: orbBreathe 16s ease-in-out infinite;

    }

    .hero-orb img {
      width: 100%;
      height: auto;
    }

    @media (max-width: 900px) {
      .topnav {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        right: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.15rem;
        z-index: 1500;
        font-size: 1rem;
      }

      .topnav a {
        display: inline-block;
        padding: 0.15rem 0;
        line-height: 1.2;
      }

      .name-section {
        top: auto;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(30px);
        width: 100vw;
        padding: 0rem;
        margin-left:0rem;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      h1,
      h2 {
        font-size: clamp(2.5rem, 10vw, 4.5rem);
        color: var(--red);
                margin-left:1rem;

      }



      .hero-orb {
        width: 100vw;
        opacity: 1.0;
      }

      body>main {
        margin-top: 0;
        height: 100svh;
      }

    }

    @media (max-width: 1200px) and (min-width: 901px) {
      .topnav {
        gap: 0.75rem;
      }
    }
  </style>


</head>

<body>
  <nav class="topnav" aria-label="Site">
    <a href="index.html" class="active">home</a>
    <a href="about.html">about</a>
    <a href="resume.html">resume</a>
    <a href="paintings.html">paintings</a>
    <a href="media.html">media</a>
    <a href="websites.html">websites</a>
    <a href="contact.html">contact</a>
  </nav>

  <main>
    <div class="hero-orb">
      <img src="depth/orbs/darkblue.svg" alt="" aria-hidden="true">
    </div>
    <section class="name-section">
      <h2> juliette mangon</h2>


    </section>
  </main>

  <script>

  </script>
</body>

</html>
